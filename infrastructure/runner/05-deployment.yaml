apiVersion: apps/v1
kind: Deployment
metadata:
  name: actions-runner
  namespace: actions-runner
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: homelab-tofu-workflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actions-runner
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: actions-runner
        app.kubernetes.io/part-of: homelab-tofu-workflow
    spec:
      serviceAccountName: actions-runner
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: runner
          image: ghcr.io/actions/actions-runner:latest
          imagePullPolicy: Always
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -euo pipefail
              GH_TOKEN_FILE="${GH_TOKEN_FILE:-/secrets/runner/GH_TOKEN}"
              timeout=300
              while [ ! -s "${GH_TOKEN_FILE}" ] && [ "${timeout}" -gt 0 ]; do
                sleep 5
                timeout=$((timeout - 5))
              done
              if [ ! -s "${GH_TOKEN_FILE}" ]; then
                echo "[runner] FATAL: GH_TOKEN not available after 5 minutes"
                exit 1
              fi
              GH_TOKEN="$(cat "${GH_TOKEN_FILE}")"
              REG_TOKEN="$(
                curl -sS -X POST \
                  -H "Authorization: token ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "https://api.github.com/repos/${GITHUB_ORG}/${GITHUB_REPO}/actions/runners/registration-token" \
                | jq -r '.token'
              )"
              if [ -z "${REG_TOKEN}" ] || [ "${REG_TOKEN}" = "null" ]; then
                echo "[runner] FATAL: could not obtain registration token"
                exit 1
              fi
              cd /home/runner
              ./config.sh \
                --name "homelab-tofu-runner-$(hostname)" \
                --url "https://github.com/${GITHUB_ORG}/${GITHUB_REPO}" \
                --token "${REG_TOKEN}" \
                --labels "${RUNNER_LABELS}" \
                --work "${RUNNER_WORK}" \
                --unattended \
                --replace
              exec ./run.sh
          env:
            - name: GH_TOKEN_FILE
              value: /secrets/runner/GH_TOKEN
            - name: GITHUB_ORG
              value: karabayogo
            - name: GITHUB_REPO
              value: homelab-tofu-workflow
            - name: RUNNER_LABELS
              value: self-hosted,LAN,k8s-workbench,moltbot
            - name: RUNNER_WORK
              value: /home/runner/_work
          volumeMounts:
            - name: secrets-runner
              mountPath: /secrets/runner
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 4Gi
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
          livenessProbe:
            exec:
              command: ["sh", "-c", "ps aux | grep -v grep | grep Runner.Listener || exit 1"]
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            exec:
              command: ["sh", "-c", "ps aux | grep -v grep | grep -q Runner.Listener"]
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: secrets-runner
          secret:
            secretName: runner-auth
            optional: false
      tolerations:
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoSchedule"
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"

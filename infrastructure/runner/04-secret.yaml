# ESO will populate this from Vault: secret/data/actions-runner/github-token
# The GH_TOKEN here is the PAT used ONLY to provision ephemeral runner registration tokens.
# It lives in Vault, not in GitHub Secrets (so it persists across repo secrets rotations).
apiVersion: v1
kind: Secret
metadata:
  name: runner-auth
  namespace: actions-runner
  labels:
    app.kubernetes.io/managed-by: argocd
type: Opaque
stringData:
  GH_TOKEN: ""   # Patched by ESO on reconcile (Vault path: secret/data/actions-runner/github-token)
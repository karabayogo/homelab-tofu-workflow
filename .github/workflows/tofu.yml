name: Reusable OpenTofu Apply

on:
  workflow_call:
    inputs:
      runner_labels:
        type: string
        default: '["self-hosted", "LAN", "moltbot"]'
        description: "JSON array of runner labels"
      tofu_version:
        type: string
        default: "1.11.6"
        description: "OpenTofu version to install"
      terraform_dir:
        type: string
        default: "infrastructure/terraform"
        description: "Directory containing terraform files"
      checkout_path:
        type: string
        default: "."
        description: "Path to checkout the repo into (use '.' for top-level, or a subdirectory name)"
    secrets:
      PROXMOX_API_TOKEN:
        required: true
      PVE_SSH_PRIVATE_KEY:
        required: true
      TOFU_BACKEND_ACCESS_KEY:
        required: true
      TOFU_BACKEND_SECRET_KEY:
        required: true
      TOFU_BACKEND_ENDPOINT:
        required: true
      GARAGE_ACCESS_KEY:
        required: true
      GARAGE_SECRET_KEY:
        required: true
      GARAGE_ENDPOINT_URL_OVERRIDE:
        required: true
      VAULT_ADDR:
        required: true
      VAULT_APPROLE_ROLE_ID:
        required: true
      VAULT_APPROLE_SECRET_ID:
        required: true
      VAULT_MIGRATION_APPROLE_ROLE_ID:
        required: true
      VAULT_MIGRATION_APPROLE_SECRET_ID:
        required: true
      K3S_TOKEN:
        required: false

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.GARAGE_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.GARAGE_SECRET_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL_OVERRIDE: ${{ secrets.GARAGE_ENDPOINT_URL_OVERRIDE }}
      AWS_EC2_METADATA_SERVICE_ENDPOINT: ""
      TF_VAR_vault_addr: ${{ secrets.VAULT_ADDR }}
      TF_VAR_vault_approle_role_id: ${{ secrets.VAULT_APPROLE_ROLE_ID }}
      TF_VAR_vault_approle_secret_id: ${{ secrets.VAULT_APPROLE_SECRET_ID }}
      TF_VAR_vault_migration_approle_role_id: ${{ secrets.VAULT_MIGRATION_APPROLE_ROLE_ID }}
      TF_VAR_vault_migration_approle_secret_id: ${{ secrets.VAULT_MIGRATION_APPROLE_SECRET_ID }}
      TF_VAR_state_backend_access_key: ${{ secrets.TOFU_BACKEND_ACCESS_KEY }}
      TF_VAR_state_backend_secret_key: ${{ secrets.TOFU_BACKEND_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v5
        with:
          path: ${{ inputs.checkout_path }}

      - name: Install OpenTofu
        env:
          TOFU_VERSION: ${{ inputs.tofu_version }}
        run: |
          curl -sLO "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_linux_amd64.tar.gz"
          tar -xzf tofu_${TOFU_VERSION}_linux_amd64.tar.gz
          mkdir -p ~/.local/bin
          mv tofu ~/.local/bin/
          chmod +x ~/.local/bin/tofu

      - name: Add tofu to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python deps for Garage bootstrap
        run: |
          if ! python3 -m pip --version >/dev/null 2>&1; then
            curl -fsSL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py
            python3 /tmp/get-pip.py --user --break-system-packages
          fi
          PIP_BREAK_SYSTEM_PACKAGES=1 python3 -m pip install --user boto3

      - name: Write PVE token
        run: |
          mkdir -p ~/.config/vm-gitops
          echo "proxmox:" > ~/.config/vm-gitops/config.yaml
          echo "  api_token: ${{ secrets.PROXMOX_API_TOKEN }}" >> ~/.config/vm-gitops/config.yaml

      - name: Write PVE SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          echo "${{ secrets.PVE_SSH_PRIVATE_KEY }}" > "$HOME/.ssh/pve-kai"
          chmod 600 "$HOME/.ssh/pve-kai"

      - name: Write backend config
        run: |
          cat > /tmp/tofu-backend.hcl <<EOF
          endpoint   = "${{ secrets.TOFU_BACKEND_ENDPOINT }}"
          access_key = "${{ secrets.TOFU_BACKEND_ACCESS_KEY }}"
          secret_key = "${{ secrets.TOFU_BACKEND_SECRET_KEY }}"
          EOF
          chmod 600 /tmp/tofu-backend.hcl

      - name: Terraform init
        run: |
          cd ${{ inputs.checkout_path }}/${{ inputs.terraform_dir }}
          ~/.local/bin/tofu init -upgrade -reconfigure -backend-config=/tmp/tofu-backend.hcl

      - name: Terraform plan
        # -refresh=false avoids bpg/proxmox provider "Plugin did not respond"
        # hangs during ReadResource for rebuilt VMs.
        run: |
          cd ${{ inputs.checkout_path }}/${{ inputs.terraform_dir }}
          if [ -n "${K3S_TOKEN:-}" ]; then
            ~/.local/bin/tofu plan -refresh=false -var="proxmox_api_token=${{ secrets.PROXMOX_API_TOKEN }}" -var="k3s_token=${K3S_TOKEN}"
          else
            ~/.local/bin/tofu plan -refresh=false -var="proxmox_api_token=${{ secrets.PROXMOX_API_TOKEN }}"
          fi
        env:
          K3S_TOKEN: ${{ secrets.K3S_TOKEN }}

      - uses: actions/upload-artifact@v7
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ inputs.checkout_path }}/${{ inputs.terraform_dir }}/tfplan
          retention-days: 1

  apply:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    environment: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.GARAGE_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.GARAGE_SECRET_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL_OVERRIDE: ${{ secrets.GARAGE_ENDPOINT_URL_OVERRIDE }}
      AWS_EC2_METADATA_SERVICE_ENDPOINT: ""
      TF_VAR_vault_addr: ${{ secrets.VAULT_ADDR }}
      TF_VAR_vault_approle_role_id: ${{ secrets.VAULT_APPROLE_ROLE_ID }}
      TF_VAR_vault_approle_secret_id: ${{ secrets.VAULT_APPROLE_SECRET_ID }}
      TF_VAR_vault_migration_approle_role_id: ${{ secrets.VAULT_MIGRATION_APPROLE_ROLE_ID }}
      TF_VAR_vault_migration_approle_secret_id: ${{ secrets.VAULT_MIGRATION_APPROLE_SECRET_ID }}
      TF_VAR_state_backend_access_key: ${{ secrets.TOFU_BACKEND_ACCESS_KEY }}
      TF_VAR_state_backend_secret_key: ${{ secrets.TOFU_BACKEND_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v5
        with:
          path: ${{ inputs.checkout_path }}

      - name: Install OpenTofu
        env:
          TOFU_VERSION: ${{ inputs.tofu_version }}
        run: |
          curl -sLO "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_linux_amd64.tar.gz"
          tar -xzf tofu_${TOFU_VERSION}_linux_amd64.tar.gz
          mkdir -p ~/.local/bin
          mv tofu ~/.local/bin/
          chmod +x ~/.local/bin/tofu

      - name: Add tofu to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Python deps for Garage bootstrap
        run: |
          if ! python3 -m pip --version >/dev/null 2>&1; then
            curl -fsSL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py
            python3 /tmp/get-pip.py --user --break-system-packages
          fi
          PIP_BREAK_SYSTEM_PACKAGES=1 python3 -m pip install --user boto3

      - name: Write PVE token
        run: |
          mkdir -p ~/.config/vm-gitops
          echo "proxmox:" > ~/.config/vm-gitops/config.yaml
          echo "  api_token: ${{ secrets.PROXMOX_API_TOKEN }}" >> ~/.config/vm-gitops/config.yaml

      - name: Write PVE SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          echo "${{ secrets.PVE_SSH_PRIVATE_KEY }}" > "$HOME/.ssh/pve-kai"
          chmod 600 "$HOME/.ssh/pve-kai"

      - name: Write backend config
        run: |
          cat > /tmp/tofu-backend.hcl <<EOF
          endpoint   = "${{ secrets.TOFU_BACKEND_ENDPOINT }}"
          access_key = "${{ secrets.TOFU_BACKEND_ACCESS_KEY }}"
          secret_key = "${{ secrets.TOFU_BACKEND_SECRET_KEY }}"
          EOF
          chmod 600 /tmp/tofu-backend.hcl

      - name: Terraform init
        run: |
          cd ${{ inputs.checkout_path }}/${{ inputs.terraform_dir }}
          ~/.local/bin/tofu init -upgrade -reconfigure -backend-config=/tmp/tofu-backend.hcl

      - name: Terraform apply
        # -refresh=false avoids bpg/proxmox provider "Plugin did not respond"
        # hangs during ReadResource for rebuilt VMs (see RCA 2026-07-14 VM 600 rebuild).
        # State in Garage S3 is authoritative; we only need to apply pending changes.
        run: |
          cd ${{ inputs.checkout_path }}/${{ inputs.terraform_dir }}
          if [ -n "${K3S_TOKEN:-}" ]; then
            ~/.local/bin/tofu apply -auto-approve -refresh=false -var="proxmox_api_token=${{ secrets.PROXMOX_API_TOKEN }}" -var="k3s_token=${K3S_TOKEN}"
          else
            ~/.local/bin/tofu apply -auto-approve -refresh=false -var="proxmox_api_token=${{ secrets.PROXMOX_API_TOKEN }}"
          fi
        env:
          K3S_TOKEN: ${{ secrets.K3S_TOKEN }}

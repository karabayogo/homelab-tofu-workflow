name: Infra Apply

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily drift check — 09:00 Melbourne time (AEST = UTC+10)
    # Using cron schedule so CI runs independently of code changes.
    - cron: "0 23 * * *"

jobs:
  tofu:
    uses: ./.github/workflows/tofu.yml
    with:
      runner_labels: '["self-hosted", "LAN", "moltbot"]'
      tofu_version: "1.11.6"
      terraform_dir: infrastructure/terraform
      checkout_path: "."
    secrets:
      PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
      PVE_SSH_PRIVATE_KEY: ${{ secrets.PVE_SSH_PRIVATE_KEY }}
      TOFU_BACKEND_ACCESS_KEY: ${{ secrets.TOFU_BACKEND_ACCESS_KEY }}
      TOFU_BACKEND_SECRET_KEY: ${{ secrets.TOFU_BACKEND_SECRET_KEY }}
      TOFU_BACKEND_ENDPOINT: ${{ secrets.TOFU_BACKEND_ENDPOINT }}
      GARAGE_ACCESS_KEY: ${{ secrets.GARAGE_ACCESS_KEY }}
      GARAGE_SECRET_KEY: ${{ secrets.GARAGE_SECRET_KEY }}
      GARAGE_ENDPOINT_URL_OVERRIDE: ${{ secrets.GARAGE_ENDPOINT_URL_OVERRIDE }}
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_APPROLE_ROLE_ID: ${{ secrets.VAULT_APPROLE_ROLE_ID }}
      VAULT_APPROLE_SECRET_ID: ${{ secrets.VAULT_APPROLE_SECRET_ID }}
      VAULT_MIGRATION_APPROLE_ROLE_ID: ${{ secrets.VAULT_MIGRATION_APPROLE_ROLE_ID }}
      VAULT_MIGRATION_APPROLE_SECRET_ID: ${{ secrets.VAULT_MIGRATION_APPROLE_SECRET_ID }}
      K3S_TOKEN: ${{ secrets.K3S_TOKEN }}

  k8s-multipath-hardening:
    needs: tofu
    if: needs.tofu.result == 'success'
    runs-on: self-hosted
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.GARAGE_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.GARAGE_SECRET_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL_OVERRIDE: ${{ secrets.GARAGE_ENDPOINT_URL_OVERRIDE }}
      AWS_EC2_METADATA_SERVICE_ENDPOINT: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            infrastructure
            scripts
          sparse-checkout-cone-mode: false

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.6"

      - name: Write node SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          echo "${{ secrets.PVE_SSH_PRIVATE_KEY }}" > "$HOME/.ssh/pve-kai"
          chmod 600 "$HOME/.ssh/pve-kai"

      - name: OpenTofu init
        run: |
          cd infrastructure/terraform
          cat > /tmp/tofu-backend.hcl <<EOF
          endpoint   = "http://192.168.1.246:9000"
          access_key = "${{ secrets.TOFU_BACKEND_ACCESS_KEY }}"
          secret_key = "${{ secrets.TOFU_BACKEND_SECRET_KEY }}"
          EOF
          chmod 600 /tmp/tofu-backend.hcl
          unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_ENDPOINT_URL_OVERRIDE
          tofu init -reconfigure -backend-config=/tmp/tofu-backend.hcl

      - name: Verify multipath hardening on PRs
        if: github.event_name == 'pull_request'
        run: |
          SCRIPT_PATH="scripts/enforce-k8s-multipath-hardening.sh"
          test -f "$SCRIPT_PATH"
          bash "$SCRIPT_PATH" --check

      - name: Enforce multipath hardening on managed k8s nodes
        if: github.event_name != 'pull_request'
        run: |
          SCRIPT_PATH="scripts/enforce-k8s-multipath-hardening.sh"
          test -f "$SCRIPT_PATH"
          bash "$SCRIPT_PATH" --enforce

  k8s-cloud-init-sudoers-hygiene:
    needs: tofu
    if: needs.tofu.result == 'success'
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            infrastructure
            scripts
          sparse-checkout-cone-mode: false

      - name: Write node SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          echo "${{ secrets.PVE_SSH_PRIVATE_KEY }}" > "$HOME/.ssh/pve-kai"
          chmod 600 "$HOME/.ssh/pve-kai"

      - name: Verify cloud-init sudoers hygiene on PRs
        if: github.event_name == 'pull_request'
        run: |
          SCRIPT_PATH="scripts/enforce-k8s-cloud-init-sudoers.sh"
          test -f "$SCRIPT_PATH"
          bash "$SCRIPT_PATH" --check

      - name: Enforce cloud-init sudoers hygiene on managed k8s nodes
        if: github.event_name != 'pull_request'
        run: |
          SCRIPT_PATH="scripts/enforce-k8s-cloud-init-sudoers.sh"
          test -f "$SCRIPT_PATH"
          bash "$SCRIPT_PATH" --enforce

  garage-vm-bootstrap-reconcile:
    needs: tofu
    if: needs.tofu.result == 'success'
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            infrastructure
            scripts
          sparse-checkout-cone-mode: false

      - name: Install PyYAML
        run: |
          if ! python3 -m pip --version >/dev/null 2>&1; then
            curl -fsSL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py
            python3 /tmp/get-pip.py --user --break-system-packages
          fi
          PIP_BREAK_SYSTEM_PACKAGES=1 python3 -m pip install --user pyyaml

      - name: Write PVE SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          echo "${{ secrets.PVE_SSH_PRIVATE_KEY }}" > "$HOME/.ssh/pve-kai"
          chmod 600 "$HOME/.ssh/pve-kai"

      - name: Write terraform.tfvars from secrets
        run: |
          cat > infrastructure/terraform/terraform.tfvars <<'TFVARS'
          vault_addr = "${{ secrets.VAULT_ADDR }}"
          vault_approle_role_id = "${{ secrets.VAULT_APPROLE_ROLE_ID }}"
          vault_approle_secret_id = "${{ secrets.VAULT_APPROLE_SECRET_ID }}"
          vault_migration_approle_role_id = "${{ secrets.VAULT_MIGRATION_APPROLE_ROLE_ID }}"
          vault_migration_approle_secret_id = "${{ secrets.VAULT_MIGRATION_APPROLE_SECRET_ID }}"
          TFVARS
          chmod 600 infrastructure/terraform/terraform.tfvars

      - name: Verify Garage VM bootstrap convergence on PRs
        if: github.event_name == 'pull_request'
        run: |
          SCRIPT_PATH="scripts/enforce-garage-vm-bootstrap.sh"
          test -f "$SCRIPT_PATH"
          bash "$SCRIPT_PATH" --check

      - name: Enforce Garage VM bootstrap convergence on managed Garage nodes
        if: github.event_name != 'pull_request'
        run: |
          SCRIPT_PATH="scripts/enforce-garage-vm-bootstrap.sh"
          test -f "$SCRIPT_PATH"
          bash "$SCRIPT_PATH" --enforce

  # Phase 5: Drift detection — runs tofu plan and posts summary as PR comment
  # Only runs on scheduled trigger (not on push/PR to avoid noise)
  drift-check:
    if: github.event_name == 'schedule'
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infrastructure/terraform
          sparse-checkout-cone-mode: false

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.6"

      - name: Run tofu plan
        # -refresh=false avoids bpg/proxmox provider "Plugin did not respond"
        # hangs during ReadResource for rebuilt VMs.
        id: plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.GARAGE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.GARAGE_SECRET_KEY }}
          AWS_ENDPOINT_URL_OVERRIDE: ${{ secrets.GARAGE_ENDPOINT_URL_OVERRIDE }}
          TF_VAR_vault_addr: ${{ secrets.VAULT_ADDR }}
          TF_VAR_vault_approle_role_id: ${{ secrets.VAULT_APPROLE_ROLE_ID }}
          TF_VAR_vault_approle_secret_id: ${{ secrets.VAULT_APPROLE_SECRET_ID }}
          TF_VAR_vault_migration_approle_role_id: ${{ secrets.VAULT_MIGRATION_APPROLE_ROLE_ID }}
          TF_VAR_vault_migration_approle_secret_id: ${{ secrets.VAULT_MIGRATION_APPROLE_SECRET_ID }}
        run: |
          cd infrastructure/terraform
          tofu init -backend=false 2>&1 | tail -5
          tofu plan -refresh=false -detailed-exitcode -lock=false 2>&1 | tee /tmp/plan_output.txt
          echo "PLAN_EXIT=$?" >> $GITHUB_OUTPUT

      - name: Post drift summary
        if: always()
        run: |
          PLAN_EXIT=$(cat /tmp/plan_output.txt | tail -5)
          echo "## OpenTofu Drift Check" >> $GITHUB_STEP_SUMMARY
          echo "Plan exit code: \${PLAN_EXIT##*:}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/plan_output.txt | tail -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

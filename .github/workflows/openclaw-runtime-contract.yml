name: OpenClaw Runtime Contract

on:
  workflow_run:
    workflows: ["Infra Apply"]
    types: [completed]
  workflow_dispatch:

jobs:
  contract:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH key
        env:
          OPENCLAW_SSH_PRIVATE_KEY: ${{ secrets.OPENCLAW_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$OPENCLAW_SSH_PRIVATE_KEY" > "$HOME/.ssh/openclaw_vm_key"
          chmod 600 "$HOME/.ssh/openclaw_vm_key"

      - name: Run runtime contract
        env:
          OPENCLAW_VM_USER: ${{ vars.OPENCLAW_VM_USER }}
          OPENCLAW_VM_HOST: ${{ vars.OPENCLAW_VM_HOST }}
        run: |
          set -euo pipefail
          git sparse-checkout disable || true
          git checkout -- .
          test -f scripts/openclaw-runtime-contract.sh
          export SSH_KEY_PATH="$HOME/.ssh/openclaw_vm_key"
          bash scripts/openclaw-runtime-contract.sh
